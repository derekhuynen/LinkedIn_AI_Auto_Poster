version: 2
updates:
  # Backend (Azure Functions app)
  - package-ecosystem: npm
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      api-dependencies:
        patterns:
          - '*'

  # Frontend (Next.js dashboard)
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      web-dependencies:
        patterns:
          - '*'

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
