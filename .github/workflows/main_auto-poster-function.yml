# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy LinkedIn Ai Auto Poster - linkedin-ai-auto-poster

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/main_auto-poster-function.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './api' # path to the Azure Function App project
  NODE_VERSION: '22.x' # Node version for the CI build/test runner

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 'Resolve Project Dependencies Using Npm'
        shell: pwsh
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm ci
          npm run typecheck
          npm test
          npm run build
          popd

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v7
        with:
          name: node-app
          path: .

  deploy:
    # Deploy only on manual dispatch so every push stays green on build + tests.
    # (Requires the AZUREAPPSERVICE_* OIDC secrets to be valid.)
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F24D5185D71242BCB1FB31A8AB9C7F15 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_56CA1554FE144524AE3B630ADBB55117 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F8A449F914D64B7CB51E3E15842F48FB }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'auto-poster-function'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
