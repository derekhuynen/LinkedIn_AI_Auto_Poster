name: Build and test web dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/web-deploy.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-deploy.yml'
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    name: Build and test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install, test, and build
        run: |
          cd web
          npm ci
          npm run test
          npm run build

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: cd web && npm run e2e
